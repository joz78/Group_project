<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Prediction Interface</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        .card { max-width: 640px; padding: 1.5rem; border: 1px solid #ddd; border-radius: 8px; }
        textarea { width: 100%; height: 120px; margin-top: 0.5rem; }
        button { margin-top: 1rem; padding: 0.75rem 1.25rem; }
        pre { background: #f7f7f7; padding: 1rem; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>ML Model Prediction</h1>
        <p>Enter comma-separated numeric features to send to the ML model via REST API.</p>
        <form id="predict-form">
            <label for="input-values">Input values:</label>
            <textarea id="input-values" placeholder="e.g. 0.5, 1.2, 3.7"></textarea>
            <button type="submit">Predict</button>
        </form>
        <h2>Response</h2>
        <pre id="result">Waiting for input...</pre>
    </div>
    <script>
        const form = document.getElementById('predict-form');
        const result = document.getElementById('result');

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            const raw = document.getElementById('input-values').value.trim();
            if (!raw) {
                result.textContent = 'Please enter comma-separated numbers.';
                return;
            }

            const features = raw.split(',').map(v => parseFloat(v.trim())).filter(v => !Number.isNaN(v));
            if (!features.length) {
                result.textContent = 'No valid numeric values found.';
                return;
            }

            result.textContent = 'Sending request...';
            try {
                const response = await fetch('/api/predict/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features }),
                });
                const data = await response.json();
                if (!response.ok) {
                    result.textContent = 'Error: ' + (data.error || response.statusText);
                } else {
                    result.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                result.textContent = 'Request failed: ' + error.message;
            }
        });
    </script>
</body>
</html>
