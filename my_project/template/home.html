<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML Prediction Interface</title>
    <style>
        body { font-family: Inter, Arial, sans-serif; margin: 0; min-height: 100vh; background: #eef4fb; color: #1f2937; display: flex; justify-content: center; align-items: center; padding: 2rem; }
        .card { width: 100%; max-width: 680px; padding: 2rem; border-radius: 24px; background: #ffffff; box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08); }
        h1 { margin-top: 0; font-size: 2rem; letter-spacing: -0.03em; }
        p { color: #4b5563; line-height: 1.75; }
        .field { margin-top: 1.5rem; }
        label { display: block; margin-bottom: 0.75rem; font-weight: 700; color: #111827; }
        input[type="file"] { width: 100%; padding: 0.95rem 1rem; border: 1px solid #d1d5db; border-radius: 16px; background: #f9fafb; cursor: pointer; }
        .preview-wrapper { margin-top: 1.5rem; text-align: center; }
        #preview { max-width: 100%; height: auto; border-radius: 18px; box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08); display: none; }
        button { margin-top: 1.75rem; padding: 1rem 1.5rem; border: none; border-radius: 14px; background: #2563eb; color: #fff; font-size: 1rem; cursor: pointer; transition: transform 0.15s ease, background 0.15s ease; }
        button:hover { background: #1d4ed8; transform: translateY(-1px); }
        pre { margin-top: 1.75rem; background: #f8fafc; padding: 1.25rem; border-radius: 16px; color: #111827; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Image Prediction</h1>
        <p>Upload a photo and let the ML model analyze it. Supported formats: JPG, PNG, GIF.</p>
        <form id="predict-form" enctype="multipart/form-data">
            <div class="field">
                <label for="image-upload">Choose image</label>
                <input type="file" id="image-upload" accept="image/*" required />
            </div>
            <div class="preview-wrapper">
                <img id="preview" alt="Image preview" />
            </div>
            <button type="submit">Upload and Predict</button>
        </form>
        <h2>Response</h2>
        <pre id="result">Waiting for upload...</pre>
    </div>
    <script>
        const form = document.getElementById('predict-form');
        const result = document.getElementById('result');
        const fileInput = document.getElementById('image-upload');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) {
                preview.style.display = 'none';
                return;
            }
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
        });

        form.addEventListener('submit', async function (event) {
            event.preventDefault();
            const file = fileInput.files[0];
            if (!file) {
                result.textContent = 'Please select an image file to upload.';
                return;
            }

            const formData = new FormData();
            formData.append('image', file);

            result.textContent = 'Sending image...';
            try {
                const response = await fetch('/api/predict/', {
                    method: 'POST',
                    body: formData,
                });
                const data = await response.json();
                if (!response.ok) {
                    result.textContent = 'Error: ' + (data.error || response.statusText);
                } else {
                    result.textContent = JSON.stringify(data, null, 2);
                }
            } catch (error) {
                result.textContent = 'Upload failed: ' + error.message;
            }
        });
    </script>
</body>
</html>
